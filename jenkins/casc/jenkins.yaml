jenkins:
  systemMessage: "Jenkins configurado como codigo para el Reto 6"
  numExecutors: 2
  mode: NORMAL
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin123}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://localhost:9090/"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "${GIT_USERNAME}"
              password: "${GIT_TOKEN}"
              description: "GitHub token for Jenkins SCM"
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONAR_TOKEN}"
              description: "SonarQube token for analysis and quality gate"

jobs:
  - script: >
      pipelineJob('reto6-express-ci') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${GIT_REPO_URL:-https://github.com/Jalbyte/Retos-microservicios.git}')
                  credentials('github-pat')
                }
                branch('${GIT_BRANCH:-*/main}')
                extensions {
                  wipeOutWorkspace()
                  cleanBeforeCheckout()
                }
              }
            }
            scriptPath('Reto6/Jenkinsfile')
            lightweight(false)
          }
        }
      }
  - script: >
      pipelineJob('reto2-go-ci') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${GIT_REPO_URL:-https://github.com/Jalbyte/Retos-microservicios.git}')
                  credentials('github-pat')
                }
                branch('${GIT_BRANCH:-*/main}')
                extensions {
                  wipeOutWorkspace()
                  cleanBeforeCheckout()
                }
              }
            }
            scriptPath('Reto2/gestion-departamentos/Jenkinsfile')
            lightweight(false)
          }
        }
      }
