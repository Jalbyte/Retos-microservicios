services:
  # =========================
  # BASE DE DATOS EMPLEADOS
  # =========================
  database-empleados:
    image: postgres:15
    container_name: empleados_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-camilo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camilo}
      POSTGRES_DB: ${POSTGRES_DB_EMPLEADOS:-empleados_db}
    ports:
      - "5433:5432"
    volumes:
      - empleados_data:/var/lib/postgresql/data
      - ./Reto1/gestion-empleados/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camilo} -d ${POSTGRES_DB_EMPLEADOS:-empleados_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================
  # BASE DE DATOS DEPARTAMENTOS
  # =========================
  database-departamentos:
    image: postgres:15
    container_name: departamentos_db
    restart: always
    environment:
      POSTGRES_USER: camilo
      POSTGRES_PASSWORD: camilo
      POSTGRES_DB: departamentos_db
    ports:
      - "5434:5432"
    volumes:
      - departamentos_data:/var/lib/postgresql/data
      - ./Reto2/gestion-departamentos/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U camilo -d departamentos_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================
  # BASE DE DATOS NOTIFICACIONES
  # =========================
  notification-db:
    image: mysql:8.0
    container_name: notification_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: notifications
    ports:
      - "3306:3306"
    volumes:
      - notifications_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # BASE DE DATOS PERFILES
  # =========================
  perfiles-db:
    image: postgres:15
    container_name: perfiles_db
    restart: always
    environment:
      POSTGRES_USER: camilo
      POSTGRES_PASSWORD: camilo
      POSTGRES_DB: perfiles_db
    ports:
      - "5435:5432"
    volumes:
      - perfiles_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U camilo -d perfiles_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================
  # BASE DE DATOS AUTH (Reto 4)
  # =========================
  db-auth:
    image: postgres:15
    container_name: auth_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5436:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./Reto4/auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auth_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================
  # SERVICIO EMPLEADOS
  # =========================
  empleados-service:
    build: ./Reto1/gestion-empleados
    container_name: empleados_api
    restart: always
    depends_on:
      database-empleados:
        condition: service_healthy
      departamentos-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://camilo:camilo@database-empleados:5432/empleados_db?schema=public
      DEPARTAMENTOS_URL: http://departamentos-service:8081
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================
  # SERVICIO DEPARTAMENTOS
  # =========================
  departamentos-service:
    build: ./Reto2/gestion-departamentos
    container_name: departamentos_api
    restart: always
    depends_on:
      database-departamentos:
        condition: service_healthy
    environment:
      PORT: 8081
      DATABASE_URL: postgresql://camilo:camilo@database-departamentos:5432/departamentos_db?sslmode=disable
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "8081:8081"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8081/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # RABBITMQ
  # =========================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # SERVICIO NOTIFICACIONES
  # =========================
  notificaciones-service:
    build: ./Reto3/servicio-notificaciones
    container_name: notificaciones_api
    restart: always
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: notification-db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: notifications
      DB_PORT: 3306
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: empleados_exchange
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "8084:8084"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8084/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # SERVICIO PERFILES
  # =========================
  perfiles-service:
    build: ./Reto3/gestion-perfiles
    container_name: perfiles_api
    restart: always
    depends_on:
      perfiles-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 8085
      DB_HOST: perfiles-db
      DB_PORT: 5432
      DB_USER: camilo
      DB_PASSWORD: cameyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30ilo
      DB_NAME: perfiles_db
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: empleados_exchange
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "8085:8085"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8085/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # AUTH SERVICE (Reto 4)
  # =========================
  auth-service:
    build: ./Reto4/auth-service
    container_name: auth_api
    restart: always
    depends_on:
      db-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@db-auth:5432/auth_db
      JWT_SECRET: super_secret_reto4_jwt_key_2026
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: empleados_exchange
      AUTH_EXCHANGE: auth_exchange
    ports:
      - "3001:3001"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # API GATEWAY
  # =========================
  api-gateway:
    build: ./Reto4/api-gateway
    container_name: api_gateway
    restart: always
    depends_on:
      empleados-service:
        condition: service_healthy
      departamentos-service:
        condition: service_healthy
      perfiles-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "3000:3000"

  # =========================
  # RETO 6 - MICROSERVICIO EXPRESS
  # =========================
  reto6-express-service:
    build: ./Reto6
    container_name: reto6_express_api
    restart: always
    environment:
      PORT: 8086
    ports:
      - "8086:8086"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8086/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # =========================
  # RETO 6 - SONARQUBE DB
  # =========================
  sonarqube-db:
    image: postgres:15
    container_name: sonarqube_db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

  # =========================
  # RETO 6 - SONARQUBE
  # =========================
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: always
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  # =========================
  # RETO 6 - JENKINS
  # =========================
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins_ci
    user: root
    restart: always
    depends_on:
      - sonarqube
    environment:
      JENKINS_ADMIN_ID: admin
      JENKINS_ADMIN_PASSWORD: admin123
      GIT_REPO_URL: https://github.com/Jalbyte/Retos-microservicios.git
      GIT_BRANCH: "*/main"
      GIT_USERNAME: Jalbyte
      GIT_TOKEN: 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
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: squ_0963223b0daad7bb9cdf933394bfdff3d7737add
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  empleados_data:
  departamentos_data:
  notifications_data:
  perfiles_data:
  auth_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  jenkins_home:
