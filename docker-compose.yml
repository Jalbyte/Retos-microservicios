services:
  # =========================
  # BASE DE DATOS EMPLEADOS
  # =========================
  database-empleados:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-camilo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camilo}
      POSTGRES_DB: ${POSTGRES_DB_EMPLEADOS:-empleados_db}
    ports:
      - "${DB_EMP_PORT:-5433}:5432"
    volumes:
      - empleados_data:/var/lib/postgresql/data
      - ./Reto1/gestion-empleados/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camilo} -d ${POSTGRES_DB_EMPLEADOS:-empleados_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network

  # =========================
  # BASE DE DATOS DEPARTAMENTOS
  # =========================
  database-departamentos:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: camilo
      POSTGRES_PASSWORD: camilo
      POSTGRES_DB: departamentos_db
    ports:
      - "${DB_DEP_PORT:-5434}:5432"
    volumes:
      - departamentos_data:/var/lib/postgresql/data
      - ./Reto2/gestion-departamentos/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U camilo -d departamentos_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network

  # =========================
  # BASE DE DATOS NOTIFICACIONES
  # =========================
  notification-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: notifications
    ports:
      - "${DB_NOT_PORT:-3306}:3306"
    volumes:
      - notifications_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network

  # =========================
  # BASE DE DATOS PERFILES
  # =========================
  perfiles-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: camilo
      POSTGRES_PASSWORD: camilo
      POSTGRES_DB: perfiles_db
    ports:
      - "${DB_PER_PORT:-5435}:5432"
    volumes:
      - perfiles_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U camilo -d perfiles_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network

  # =========================
  # BASE DE DATOS AUTH (Reto 4)
  # =========================
  db-auth:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "${DB_AUTH_PORT:-5436}:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./Reto4/auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auth_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network

  # =========================
  # SERVICIO EMPLEADOS
  # =========================
  empleados-service:
    build: ./Reto1/gestion-empleados
    restart: always
    depends_on:
      - database-empleados
      - departamentos-service
      - rabbitmq
      - auth-service
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://camilo:camilo@database-empleados:5432/empleados_db?schema=public
      DEPARTAMENTOS_URL: http://departamentos-service:8081
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "${EMP_SVC_PORT:-8080}:8080"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network

  # =========================
  # SERVICIO DEPARTAMENTOS
  # =========================
  departamentos-service:
    build: ./Reto2/gestion-departamentos
    restart: always
    depends_on:
      - database-departamentos
    environment:
      PORT: 8081
      DATABASE_URL: postgresql://camilo:camilo@database-departamentos:5432/departamentos_db?sslmode=disable
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "${DEP_SVC_PORT:-8081}:8081"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8081/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network

  # =========================
  # RABBITMQ
  # =========================
  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "${RABBIT_PORT:-5672}:5672"
      - "${RABBIT_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network

  # =========================
  # SERVICIO NOTIFICACIONES
  # =========================
  notificaciones-service:
    build: ./Reto3/servicio-notificaciones
    restart: always
    depends_on:
      - notification-db
      - rabbitmq
    environment:
      DB_HOST: notification-db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: notifications
      DB_PORT: 3306
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: empleados_exchange
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "${NOT_SVC_PORT:-8084}:8084"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8084/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network

  # =========================
  # SERVICIO PERFILES
  # =========================
  perfiles-service:
    build: ./Reto3/gestion-perfiles
    restart: always
    depends_on:
      - perfiles-db
      - rabbitmq
    environment:
      PORT: 8085
      DB_HOST: perfiles-db
      DB_PORT: 5432
      DB_USER: camilo
      DB_PASSWORD: camilo
      #DB_PASSWORD: cameyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30ilo
      DB_NAME: perfiles_db
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: empleados_exchange
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "${PER_SVC_PORT:-8085}:8085"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8085/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network

  # =========================
  # AUTH SERVICE (Reto 4)
  # =========================
  auth-service:
    build: ./Reto4/auth-service
    restart: always
    depends_on:
      - db-auth
      - rabbitmq
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@db-auth:5432/auth_db
      JWT_SECRET: super_secret_reto4_jwt_key_2026
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: empleados_exchange
      AUTH_EXCHANGE: auth_exchange
    ports:
      - "${AUTH_SVC_PORT:-3001}:3001"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network

  # =========================
  # API GATEWAY
  # =========================
  api-gateway:
    build: ./Reto4/api-gateway
    restart: always
    depends_on:
      - empleados-service
      - departamentos-service
      - perfiles-service
      - auth-service
    environment:
      JWT_SECRET: super_secret_reto4_jwt_key_2026
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    networks:
      - microservices-network

  # =========================
  # RETO 6 - MICROSERVICIO EXPRESS
  # =========================
  reto6-express-service:
    build: ./Reto6
    restart: always
    environment:
      PORT: 8086
    ports:
      - "${RETO6_PORT:-8086}:8086"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8086/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices-network

  # =========================
  # RETO 6 - SONARQUBE DB
  # =========================
  sonarqube-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # =========================
  # RETO 6 - SONARQUBE
  # =========================
  sonarqube:
    image: sonarqube:lts-community
    restart: always
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "${SONAR_PORT:-9000}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - microservices-network

  # =========================
  # RETO 6 - JENKINS
  # =========================
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    user: root
    restart: always
    depends_on:
      - sonarqube
    environment:
      JENKINS_ADMIN_ID: admin
      JENKINS_ADMIN_PASSWORD: admin123
      GIT_REPO_URL: https://github.com/Jalbyte/Retos-microservicios.git
      GIT_BRANCH: "*/main"
      GIT_USERNAME: Jalbyte
      GIT_TOKEN: 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
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: squ_0963223b0daad7bb9cdf933394bfdff3d7737add
    ports:
      - "${JENKINS_PORT:-9090}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  empleados_data:
  departamentos_data:
  notifications_data:
  perfiles_data:
  auth_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  jenkins_home:
