version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: empleados_db
    restart: always
    environment:
      POSTGRES_USER: camilo
      POSTGRES_PASSWORD: camilo
      POSTGRES_DB: empleados_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  empleados-service:
    build: ./gestion-empleados
    container_name: empleados_api
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://camilo:camilo@postgres:5432/empleados_db?schema=public
    ports:
      - "8080:8080"

volumes:
  postgres_data: