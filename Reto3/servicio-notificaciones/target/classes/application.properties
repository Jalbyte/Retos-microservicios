# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8084}

# ─── MySQL DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:notifications}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
# Full AMQP URI is parsed programmatically in RabbitMQConfig.java
rabbitmq.url=${RABBITMQ_URL:amqp://admin:admin@localhost:5672}
rabbitmq.exchange=${RABBITMQ_EXCHANGE:empleados_exchange}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.notificaciones=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
