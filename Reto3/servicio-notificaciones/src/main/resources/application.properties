# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8084}

# ─── MySQL DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:notifications}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Springdoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
# Full AMQP URI is parsed programmatically in RabbitMQConfig.java
rabbitmq.url=${RABBITMQ_URL:amqp://admin:admin@localhost:5672}
rabbitmq.exchange=${RABBITMQ_EXCHANGE:empleados_exchange}

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ─── Monitoring / Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# ─── Tracing / OpenTelemetry ──────────────────────────────────────────────────
otel.service.name=${OTEL_SERVICE_NAME:notificaciones-service}
otel.exporter.zipkin.endpoint=${OTEL_EXPORTER_ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
otel.propagators=${OTEL_PROPAGATORS:tracecontext,baggage}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.notificaciones=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
