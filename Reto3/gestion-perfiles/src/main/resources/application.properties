# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8085}

# ─── PostgreSQL DataSource ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:perfiles_db}
spring.datasource.username=${DB_USER:camilo}
spring.datasource.password=${DB_PASSWORD:camilo}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
# Full AMQP URI is parsed programmatically in RabbitMQConfig.java
rabbitmq.url=${RABBITMQ_URL:amqp://admin:admin@localhost:5672}
rabbitmq.exchange=${RABBITMQ_EXCHANGE:empleados_exchange}

# ─── Springdoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ─── Monitoring / Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# ─── Tracing / OpenTelemetry ──────────────────────────────────────────────────
otel.service.name=${OTEL_SERVICE_NAME:perfiles-service}
otel.exporter.zipkin.endpoint=${OTEL_EXPORTER_ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
otel.propagators=${OTEL_PROPAGATORS:tracecontext,baggage}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.perfiles=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
